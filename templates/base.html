<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}OpenClaw Admin{% endblock %}</title>
  <style>
    /* ----- Reset & base ----- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --text:      #e1e4ed;
      --muted:     #8b8fa3;
      --accent:    #6c8aff;
      --accent-hover: #8ba3ff;
      --danger:    #ff6b6b;
      --success:   #51cf66;
      --radius:    6px;
      --font-mono: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }

    /* ----- Navigation ----- */
    nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    nav .brand {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--accent);
      margin-right: auto;
    }

    nav a.nav-link {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius);
      transition: color 0.15s, background 0.15s;
    }

    nav a.nav-link:hover {
      color: var(--text);
      background: rgba(108, 138, 255, 0.1);
    }

    /* ----- Main content ----- */
    main {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    h1 { font-size: 1.5rem; margin-bottom: 1.25rem; }
    h2 { font-size: 1.15rem; margin-bottom: 0.75rem; color: var(--muted); }

    /* ----- Cards ----- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    /* ----- Stats row ----- */
    .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      text-align: center;
    }

    .stat .value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat .label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    /* ----- Tables ----- */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    th, td {
      text-align: left;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    th {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td.role { font-weight: 600; font-family: var(--font-mono); font-size: 0.8rem; }
    td.content { max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    td.timestamp { color: var(--muted); font-family: var(--font-mono); font-size: 0.8rem; white-space: nowrap; }

    /* ----- Buttons ----- */
    .btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover { border-color: var(--accent); background: rgba(108, 138, 255, 0.08); }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: rgba(255, 107, 107, 0.1); }

    .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }

    /* ----- Forms ----- */
    textarea, input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.875rem;
      resize: vertical;
    }

    textarea:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    /* ----- Log viewer ----- */
    #log-container {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      height: 70vh;
      overflow-y: auto;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      line-height: 1.7;
    }

    #log-container .log-line { white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">🦞 OpenClaw</span>
    <a class="nav-link" href="/">Dashboard</a>
    <a class="nav-link" href="/logs">Logs</a>
    <a class="nav-link" href="/editor/soul">Soul Editor</a>
    <a class="nav-link" href="/editor/heartbeat">Heartbeat Editor</a>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
