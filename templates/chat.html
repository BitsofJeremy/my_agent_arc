{% extends "base.html" %}
{% block title %}Chat — ARC Admin{% endblock %}

{% block content %}
<style>
  .chat-wrap {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 120px);
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 0;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .msg {
    max-width: 75%;
    padding: 0.65rem 1rem;
    border-radius: var(--radius);
    font-size: 0.9rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg-user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 2px;
  }
  .msg-assistant {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
  }
  .msg-meta {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }
  .chat-input-row {
    display: flex;
    gap: 0.5rem;
    padding: 0.75rem 0;
    border-top: 1px solid var(--border);
  }
  .chat-input-row input[type="text"] {
    flex: 1;
    font-family: inherit;
    font-size: 0.9rem;
  }
  .chat-input-row .btn { white-space: nowrap; }
  #thinking {
    display: none;
    align-self: flex-start;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 0.5rem 0;
  }
  #thinking.active { display: block; }
</style>

<div class="chat-wrap">
  <h1>Chat</h1>

  <div class="chat-messages" id="chat-messages">
    {% for m in history %}
      {% if m.role in ("user", "assistant") %}
      <div class="msg msg-{{ m.role }}">
        {{ m.content }}
        <div class="msg-meta">{{ m.created_at }}</div>
      </div>
      {% endif %}
    {% endfor %}
    <div id="thinking">⏳ Thinking…</div>
  </div>

  <div class="chat-input-row">
    <input type="text" id="chat-input" placeholder="Type a message…" autocomplete="off" />
    <button class="btn btn-primary" id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('chat-messages');
  const inputEl = document.getElementById('chat-input');
  const thinkingEl = document.getElementById('thinking');
  const sendBtn = document.getElementById('send-btn');

  // Scroll to bottom on load
  messagesEl.scrollTop = messagesEl.scrollHeight;

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    // Show user message immediately
    appendMsg('user', text);
    inputEl.value = '';
    sendBtn.disabled = true;
    thinkingEl.classList.add('active');
    scrollBottom();

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      const data = await resp.json();
      appendMsg('assistant', data.response);
    } catch (err) {
      appendMsg('assistant', '⚠️ Error: ' + err.message);
    } finally {
      thinkingEl.classList.remove('active');
      sendBtn.disabled = false;
      inputEl.focus();
      scrollBottom();
    }
  }

  function appendMsg(role, content) {
    const div = document.createElement('div');
    div.className = 'msg msg-' + role;
    div.textContent = content;
    // Insert before the thinking indicator
    messagesEl.insertBefore(div, thinkingEl);
    scrollBottom();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
</script>
{% endblock %}
